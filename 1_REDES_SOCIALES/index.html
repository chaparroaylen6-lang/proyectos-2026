<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap">
    <link rel="icon" href="https://i.pinimg.com/originals/14/f7/d0/14f7d0db432f9a901224a71c96112d6d.png" type="image/png">
</head>
<body>
    <section class="main">
      <figure class="main__figure">
         <img src="principal.jpg" alt="Foto principal" class="main__img">
      </figure>
      <div class="main__contact">
        <h2 class="main__title">Hola mundo!</h2>
        <p class="main__paragraph">Bienvenido de nuevo, te hemos extrañado!</p>
        <form class="main__form">
            <input type="text" placeholder="Introduzca un nombre de usuario" class="main__input">
            <input type="password" placeholder="Contraseña" class="main__input">
            <input type="submit" value="Iniciar sesión" class="main__input main__input--send">

        </form>
        <p class="main__paragraph">Continuar con</p>
        <article class="main__social">
            <a href="#" class="main__link">
                <img src="google.jpg" alt="google" class="main__icon">
            </a>
            <a href="#" class="main__link">
                <img src="apple.jpg" alt="apple" class="main__icon">
            </a>
            <a href="#" class="main__link">
                <img src="facebook.jpg" alt="facebook" class="main__icon">
            </a>
        </article>
      </div>
    </section>
</body>
</html>
