<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventana Modal</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/6422/6422824.png" type="image/png">
</head>
<body>

    <header class="hero">
        <nav class="nav container">
            <h2 class="nav_logo">Once World</h2>

            <ul class="nav_list">
                <li class="nav_item"><a href="#" class="nav_link">Inicio</a></li>
                <li class="nav_item"><a href="#" class="nav_link">Acerca de</a></li>
                <li class="nav_item"><a href="#" class="nav_link">Contacto</a></li>
            </ul>

            <figure class="nav_menu">
                <img src="https://i.pinimg.com/736x/68/06/13/68061350c75d4511dc80b7a094be5e2c.jpg" class="nav_icon">
            </figure>
        </nav>

        <section class="hero_main container">
            <div class="hero_texts">
                <h1 class="hero_title">Hola!, Únete a nuestro equipo</h1>
                <p class="hero_subtitle">¿Quéres formar parte y unirte a la comunidad mas grande del mundo?</p>
                <a href="#" class="hero_cta">Únete a nosotros</a>

            <figure class="hero_picture">
                <img src="https://i.pinimg.com/736x/d3/20/df/d320dfb858791a3eee798a72eefbdd5d.jpg" class="hero_img">
            </figure>
        </section>

        <div style="height: 150px; overflow: hidden;" class="hero_waves">
            <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
                <path d="M0.00,49.98 C262.08,217.40 378.89,-120.09 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" style="stroke: none; fill: #fff;"></path>
            </svg>

    <section class="modal">
        <div class="modal_container">
            <img src="https://i.pinimg.com/736x/68/06/13/68061350c75d4511dc80b7a094be5e2c.jpg" class="modal_img">
            <h2 class="modal_title">¡Bienvenido al sitio!</h2>
            <p class="modal_paragraph">
                <em> One in a Million </em> <br>
                Debes registrarte e iniciar sesión. 
                Una nueva experiencia te espera.
            </p>
            <a href="../1_REDES_SOCIALES/index.html" class="modal_close">Ingresar</a>
        </div>
    </section>

    <script src="main.js"></script>
